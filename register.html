<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Smart Maternal Care AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h2>Profil Ibu Hamil</h2>
            <p>Mari mulai perjalanan sehat Anda bersama AI.</p>
        </header>

        <main class="form-container">
            <div class="card">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <div class="input-wrapper">
                            <input type="text" id="nama" placeholder="Contoh: Siti Aminah" required>
                            <i class="ph ph-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="nik">NIK KTP</label>
                        <div class="input-wrapper">
                            <input type="text" id="nik" pattern="[0-9]{16}" placeholder="16 Digit NIK" required>
                            <i class="ph ph-identification-card input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="usia">Usia Ibu</label>
                        <div class="input-wrapper">
                            <input type="number" id="usia" min="15" max="50" placeholder="Dalam hitungan tahun" required>
                            <i class="ph ph-calendar-blank input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="usiaKehamilan">Usia Kehamilan</label>
                        <div class="input-wrapper">
                            <input type="number" id="usiaKehamilan" min="1" max="42" placeholder="Dalam hitungan minggu" required>
                            <i class="ph ph-baby input-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gradient mt-4">Simpan & Lanjutkan</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const dataIbuTerdaftar = localStorage.getItem('ibu_hamil');
            
            if (dataIbuTerdaftar) {
                console.log("Ibu sudah terdaftar. Mengalihkan langsung ke Daily Tracker...");
                window.location.href = 'daily.html'; 
            }
        });
    </script>
</body>
</html>
